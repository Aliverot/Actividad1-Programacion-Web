<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 12 - Convertidor de pesos mexicanos (MXN) a dólares (USD)</title>
    <link rel="stylesheet" href="css/ejercicio12.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="contenedor-formulario">
        <h1>Convertidor de pesos mexicanos (MXN) a dólares (USD)</h1>
        <p class="subtitulo">Convierte pesos mexicanos a dólares</p>
        
        <form class="formulario">
            <div class="grupo-formulario">
                <label for="mxn">Pesos Mexicanos (MXN)</label>
                <input type="text" id="mxn" placeholder="Ej: 1000" required>
            </div>

            <button type="button" class="boton-enviar" onclick="convertir()">
                Convertir
            </button>
            
            <div class="grupo-formulario">
                <label for="usd">Dólares (USD)</label>
                <input type="text" id="usd" readonly placeholder="Resultado de la conversión">
            </div>
        </form>
    </div>

    <script src="js/ejercicio12.js"></script>
</body>
</html>
