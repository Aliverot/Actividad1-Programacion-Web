<!DOCTYPE html>
<html lang="es">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 17 - Gesti&oacute;n de Tareas</title>

</head>
<body>
    <div class="contenedor-formulario">
        <h1>Gesti&oacute;n de Tareas</h1>
        <p class="subtitulo">Agrega y elimina tareas guardadas en Local Storage</p>

        <form class="formulario">
            <div class="grupo-formulario">
                <label for="nuevaTarea">Nueva tarea</label>
                <input type="text" id="nuevaTarea" placeholder="Ej: Estudiar JavaScript" required>

                Agregar Tarea

        </form>

        <ul class="lista-tareas" id="listaTareas">
        </ul>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="js/ejercicio17.js"></script>
</body>
</html>
