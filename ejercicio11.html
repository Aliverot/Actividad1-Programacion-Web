<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 11 - Convertidor de Kilómetros a millas</title>
    <link rel="stylesheet" href="css/ejercicio11.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="contenedor-formulario">
        <h1>Convertidor de Kilómetros a millas</h1>
        <p class="subtitulo">Convierte kilómetros a millas</p>
        
        <form class="formulario">
            <div class="grupo-formulario">
                <label for="kilometros">Kilómetros</label>
                <input type="text" id="kilometros" placeholder="Ej: 25" required>
            </div>

            <button type="button" class="boton-enviar" onclick="convertir()">
                Convertir
            </button>
            
            <div class="grupo-formulario">
                <label for="millas">Millas</label>
                <input type="text" id="millas" readonly placeholder="Resultado de la conversión">
            </div>
        </form>
    </div>

    <script src="js/ejercicio11.js"></script>
</body>
</html>
