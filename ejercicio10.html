<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 10 - Calculadora</title>
    <link rel="stylesheet" href="css/ejercicio10.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="contenedor-formulario">
        <h1>Calculadora de Temperatura</h1>
        <p class="subtitulo">Convierte grados Celsius a Fahrenheit</p>
        
        <form class="formulario">
            <div class="grupo-formulario">
                <label for="celsius">Grados Celsius</label>
                <input type="text" id="celsius" placeholder="Ej: 25" required>
            </div>

            <button type="button" class="boton-enviar" onclick="convertir()">
                Convertir
            </button>
            
            <div class="grupo-formulario">
                <label for="fahrenheit">Grados Fahrenheit</label>
                <input type="text" id="fahrenheit" readonly placeholder="Resultado de la conversión">
            </div>
        </form>
    </div>

    <script src="js/ejercicio10.js"></script>
</body>
</html>
