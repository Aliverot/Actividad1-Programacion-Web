<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 14 - Analizador de Números</title>
    <link rel="stylesheet" href="css/ejercicio14.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="contenedor-formulario">
        <h1>Analizador de Números</h1>
        <p class="subtitulo">Ingresa números separados por comas</p>
        
        <form class="formulario">
            <div class="grupo-formulario">
                <label for="numeros">Números</label>
                <input type="text" id="numeros" placeholder="Ej: 10, 20, 30, 40, 50" required>
            </div>

            <button type="button" class="boton-enviar" onclick="calcular()">
                Calcular
            </button>
            
            <div class="grupo-formulario">
                <label for="mayor">Número mayor</label>
                <input type="text" id="mayor" readonly placeholder="Esperando datos...">
            </div>

            <div class="grupo-formulario">
                <label for="menor">Número menor</label>
                <input type="text" id="menor" readonly placeholder="Esperando datos...">
            </div>

            <div class="grupo-formulario">
                <label for="promedio">Promedio</label>
                <input type="text" id="promedio" readonly placeholder="Esperando datos...">
            </div>
        </form>
    </div>

    <script src="js/ejercicio14.js"></script>
</body>
</html>
